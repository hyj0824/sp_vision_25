enemy_color: "red"
# enemy_color: "blue"

#####-----神经网络参数-----#####
classify_model: assets/tiny_resnet.onnx
yolov5_model_path: assets/0526.onnx
yolov5_engine_path: assets/0526.engine
trt_fp16: true
trt_force_rebuild: false
trt_workspace_mb: 1024
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -2 # degree -2.5
pitch_offset: 0 # degree 2
comming_angle: 60 # degree
leaving_angle: 20 # degree
decision_speed: 8 # rad/s
high_speed_delay_time: 0.015 # s
low_speed_delay_time: 0.015 # s

#####-----shooter参数-----#####
first_tolerance: 3 # 近距离射击容差，degree
second_tolerance: 2 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 2
gain: 16
vid_pid: "2bdf:0001"

#  1  0  0
#  0  1  0
#  0  0  1

R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 重投影误差: 0.3145px
camera_matrix: [1851.7070167840545, 0, 721.12585328714192, 0, 1851.8175594364079, 571.69879709276688, 0, 0, 1]
distort_coeffs: [-0.093662536083526302, 0.18945726820633155, -0.00040424349861928674, -0.0040568403852123142, 0]

# 相机同理想情况的偏角: yaw-1.61 pitch-0.82 roll-0.61 degree
R_camera2gimbal: [0.02823004230930648, -0.014076983590428133, 0.99950232778328707, -0.99954530259354468, -0.010995644138609872, 0.028076393521179785, 0.010594940981141165, -0.99984045444409364, -0.014380990321749998]
t_camera2gimbal: [0.045517325957791413, 0.10544338092767802, 0.034649710880185793]

#####-----gimbal参数-----#####
com_port: "/dev/ttyACM0"
protocol: "neo"
baud_rate: 921600

#####-----planner-----#####
fire_thresh: 0.003

max_yaw_acc: 50
Q_yaw: [9e6, 0]
R_yaw: [1]

max_pitch_acc: 100
Q_pitch: [9e6,0]
R_pitch: [1]

#####-----buff_detector参数-----#####
buff_model_path: assets/yolo11_buff_int8.onnx
buff_engine_path: assets/yolo11_buff_int8.engine
rune_model_path: assets/2025-07-28-rune.onnx
rune_engine_path: assets/2025-07-28-rune.engine
rune_input_width: 640
rune_input_height: 384
rune_input_layout: nhwc
rune_normalize_input: false
rune_confidence_threshold: 0.7
rune_delay_time: 0.3
rune_target_radius: 0.145
rune_fan_len: 0.7
rune_min_fit_data_size: 20
rune_min_shooting_size: 30
rune_auto_fire: true
rune_lost_count: 20
rune_direction_window: 10
rune_max_fit_data_size: 1200
rune_fit_interval_frames: 3
rune_stale_reset_time: 2.0
rune_center_fallback_time: 0.1
rune_Qw: 0.2
rune_Qtheta: 0.08
rune_Rtheta: 0.4
rune_reject_pnp_outliers: true
rune_log_rejected_pnp: false
rune_pnp_min_distance: 1.0
rune_pnp_max_distance: 15.0
rune_pnp_min_depth: 0.5
rune_pnp_max_reprojection_error: 8.0  # px, 四点重投影 RMS 门控
rune_pnp_max_distance_jump: 2.5       # m, 仅限制 PnP 距离突变，不限制扇叶角度切换
rune_pnp_max_angle_rate: 0.0          # rad/s, 0 表示关闭角速度门控
rune_pnp_angle_gate_max_gap: 0.25
rune_fit_use_raw_angle: false         # false: 使用滤波角度做 Ceres 拟合
rune_angle_filter: simple             # simple | legacy_ekf

#####-----buff_aimer参数-----#####
fire_gap_time: 0.520   # s
predict_time: 0.100     # s
